<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --ink: #18181b;
        --muted: #71717a;
        --line: #e4e4e7;
        --surface: #fafafa;
        --accent: #6d53f5;
        --accent-ink: #5a3fe0;
        --accent-soft: #f1eefe;
        --radius: 9px;
        --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 13px;
        color: var(--ink);
        background: #fff;
        -webkit-font-smoothing: antialiased;
      }

      /* Section */
      .section + .section {
        margin-top: 20px;
      }
      .eyebrow {
        display: flex;
        align-items: center;
        gap: 7px;
        margin-bottom: 10px;
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .eyebrow::before {
        content: "";
        width: 3px;
        height: 12px;
        border-radius: 2px;
        background: var(--accent);
      }

      /* Fields */
      .field {
        display: grid;
        gap: 5px;
      }
      .field + .field {
        margin-top: 12px;
      }
      .field label {
        font-size: 11.5px;
        font-weight: 600;
        color: var(--ink);
      }
      input {
        width: 100%;
        height: 36px;
        padding: 0 11px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #fff;
        color: var(--ink);
        font-size: 13px;
        font-family: inherit;
        outline: none;
        transition: border-color 0.12s ease, box-shadow 0.12s ease;
      }
      input::placeholder {
        color: #a1a1aa;
      }
      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }

      /* Auto-derived readout box */
      .derived {
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        padding: 10px 12px;
      }
      .derived-tag {
        display: block;
        font-size: 9.5px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 8px;
      }
      .derived-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .derived-row + .derived-row {
        margin-top: 7px;
      }
      .derived-row .key {
        flex: none;
        width: 48px;
        font-size: 11px;
        color: var(--muted);
      }
      .derived input {
        height: 26px;
        padding: 0 8px;
        border: none;
        background: #fff;
        font-family: var(--mono);
        font-size: 11.5px;
        color: var(--ink);
        border-radius: 6px;
      }
      .derived input:focus {
        box-shadow: 0 0 0 2px var(--accent-soft);
      }

      /* Buttons */
      button {
        width: 100%;
        height: 40px;
        border-radius: var(--radius);
        font-family: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.12s ease, border-color 0.12s ease, transform 0.06s ease;
      }
      button:active {
        transform: translateY(1px);
      }
      .btn-secondary {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
      }
      .btn-secondary:hover {
        border-color: var(--ink);
        background: var(--surface);
      }
      .btn-primary {
        border: none;
        background: var(--accent);
        color: #fff;
        margin-top: 14px;
      }
      .btn-primary:hover {
        background: var(--accent-ink);
      }

      /* PAT helper link */
      .pat-link {
        display: inline-block;
        margin-top: 8px;
        font-size: 11px;
        color: var(--accent);
        text-decoration: none;
      }
      .pat-link:hover {
        text-decoration: underline;
      }

      /* Status */
      .status {
        margin-top: 12px;
        min-height: 16px;
        font-size: 11.5px;
        line-height: 1.4;
        color: var(--muted);
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="section">
      <div class="eyebrow">Export</div>
      <button id="export" class="btn-secondary">Export tokens.json</button>
    </div>

    <div class="section">
      <div class="eyebrow">Push to GitHub</div>

      <div class="field">
        <label for="owner">Owner</label>
        <input id="owner" value="huraypositive" placeholder="owner" />
      </div>
      <div class="field">
        <label for="repo">Repository</label>
        <input id="repo" value="huray-design-token" placeholder="repo" />
      </div>
      <div class="field">
        <label for="project">프로젝트 이름</label>
        <input id="project" placeholder="예: front-care-hub" />
      </div>

      <div class="derived">
        <span class="derived-tag">자동 생성</span>
        <div class="derived-row">
          <span class="key">branch</span>
          <input id="branch" placeholder="프로젝트 입력 시 자동" readonly />
        </div>
        <div class="derived-row">
          <span class="key">path</span>
          <input id="path" placeholder="프로젝트 입력 시 자동" readonly />
        </div>
      </div>

      <div class="field" style="margin-top: 12px">
        <label for="pat">GitHub PAT</label>
        <input id="pat" type="password" placeholder="로컬 저장 — 공유 PC 주의" />
      </div>
      <a
        id="pat-link"
        class="pat-link"
        href="https://github.com/settings/tokens/new?scopes=repo&description=huray-design-token"
        target="_blank"
        rel="noopener"
        >🔗 PAT 발급받기 (repo 권한 체크 → Generate)</a
      >

      <button id="push" class="btn-primary">Push to GitHub</button>
      <div id="status" class="status"></div>
    </div>
    <!--UI_SCRIPT-->
  </body>
</html>
